on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          sparse-checkout: 'Y'
      - name: build
        run: |
          mkdir build
          for vol in Y/*/ ; do
            stem=$(basename "$vol")
            (
              cd "$vol" && zip -r "../../build/${stem}.epub" *
            )
          done
          zip -j "build/index-Y-${GITHUB_REF_NAME}.zip" build/*
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: build/*
